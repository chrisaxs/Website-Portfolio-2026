<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROME_CV // DYNAMIC_MASTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #8e8e93; --btn-bg: #f0f0f0; }
        body.dark-mode { --bg: #0a0a0a; --text: #ffffff; --accent: #444; --btn-bg: #1a1a1a; }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; transition: 0.3s; }
        .layout { display: grid; grid-template-columns: 420px 1fr; height: 100vh; }

        /* Sidebar */
        .sidebar { background: rgba(128,128,128,0.05); padding: 30px; overflow-y: auto; border-right: 1px solid var(--accent); }
        .input-box { width: 100%; background: rgba(128,128,128,0.1); border: 1px solid var(--accent); padding: 12px; color: var(--text); margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
        .label-s { font-family: 'Syncopate'; font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; display: block; margin-top: 15px; margin-bottom: 5px; }

        /* Interactive Buttons */
        .template-btn { background: none; border: 1px solid var(--text); color: var(--text); padding: 8px; font-size: 0.65rem; cursor: pointer; margin-bottom: 5px; width: 100%; text-align: left; transition: 0.2s; font-family: 'Syncopate'; }
        .template-btn:hover { background: var(--text); color: var(--bg); }
        
        .add-btn { background: var(--btn-bg); border: 1px dashed var(--accent); color: var(--text); padding: 10px; width: 100%; cursor: pointer; font-size: 0.7rem; font-family: 'Syncopate'; margin-bottom: 20px; transition: 0.3s; }
        .add-btn:hover { border-color: var(--text); background: var(--text); color: var(--bg); }

        /* CV Preview */
        .preview-pane { display: flex; justify-content: center; padding: 40px; background: #e0e0e0; overflow-y: auto; }
        #cv-document { background: var(--bg); width: 800px; min-height: 1050px; padding: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); box-sizing: border-box; }

        .header-grid { display: grid; grid-template-columns: 1fr 140px; gap: 20px; border-bottom: 2px solid var(--text); padding-bottom: 20px; }
        .photo-box { width: 140px; height: 160px; border: 1px solid var(--text); overflow: hidden; background: #eee; }
        #outPhoto { width: 100%; height: 100%; object-fit: cover; }

        .name-title { font-family: 'Syncopate'; font-size: 2rem; margin: 0; text-transform: uppercase; }
        .section-h { font-family: 'Syncopate'; font-size: 0.75rem; border-left: 4px solid var(--text); padding-left: 10px; margin: 35px 0 12px; letter-spacing: 3px; }
        .content { line-height: 1.6; font-size: 0.95rem; white-space: pre-wrap; margin-bottom: 10px; }
        
        .entry-block { margin-bottom: 15px; }
        .entry-title { font-weight: bold; text-transform: uppercase; display: block; }
        
        .fab { position: fixed; bottom: 20px; right: 20px; background: #000; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Syncopate'; font-size: 0.7rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <h2 style="font-family:'Syncopate'; font-size: 0.8rem;">CHROME_ENGINE_v6</h2>
        <button class="template-btn" onclick="document.body.classList.toggle('dark-mode')">🌓 THEME SWAP</button>

        <span class="label-s">PORTRAIT PHOTO</span>
        <input type="file" class="input-box" onchange="loadImg(event)">
        
        <span class="label-s">FULL NAME</span>
        <input type="text" id="inName" class="input-box" placeholder="Name" oninput="sync()">

        <span class="label-s">SUMMARY TEMPLATES</span>
        <button class="template-btn" onclick="applyTemplate('I was participating in [Field] for [X] years, focusing on building scalable solutions.')">A: PARTICIPATION</button>
        <button class="template-btn" onclick="applyTemplate('I loved working in [Industry] for [X] years and was a thanks to [Company/Mentor] for the growth.')">B: GROWTH</button>
        <textarea id="inSumm" class="input-box" rows="3" oninput="sync()"></textarea>

        <span class="label-s">EDUCATION</span>
        <div id="eduList"></div>
        <button class="add-btn" onclick="addEntry('eduList')">+ ADD EDUCATION</button>

        <span class="label-s">EXPERIENCE</span>
        <div id="expList"></div>
        <button class="add-btn" onclick="addEntry('expList')">+ ADD EXPERIENCE</button>

        <span class="label-s">CERTIFICATES</span>
        <div id="certList"></div>
        <button class="add-btn" onclick="addEntry('certList')">+ ADD CERTIFICATE</button>

        <span class="label-s">PROJECTS</span>
        <div id="projList"></div>
        <button class="add-btn" onclick="addEntry('projList')">+ ADD PROJECT</button>

        <span class="label-s">TECHNICAL SKILLS</span>
        <input type="text" id="inSkills" class="input-box" placeholder="Python, React..." oninput="sync()">
    </div>

    <div class="preview-pane">
        <div id="cv-document">
            <div class="header-grid">
                <div>
                    <h1 id="outName" class="name-title">YOUR NAME</h1>
                    <p style="color:var(--accent); font-size: 0.7rem; letter-spacing: 2px; margin-top: 10px;">PROFESSIONAL PROFILE</p>
                </div>
                <div class="photo-box">
                    <img id="outPhoto" src="" alt="" style="display:none">
                </div>
            </div>

            <div class="section-h">EXECUTIVE SUMMARY</div>
            <div id="outSumm" class="content">...</div>

            <div class="section-h">EDUCATION</div>
            <div id="outEdu"></div>

            <div class="section-h">EXPERIENCE</div>
            <div id="outExp"></div>

            <div class="section-h">CERTIFICATIONS</div>
            <div id="outCert"></div>

            <div class="section-h">PROJECTS</div>
            <div id="outProj"></div>

            <div class="section-h">SKILLS</div>
            <div id="outSkills" class="content">...</div>
        </div>
    </div>
</div>

<button class="fab" onclick="downloadPDF()">GENERATE PDF</button>

<script>
    // Logic to add new input fields
    function addEntry(containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = "entry-group";
        div.innerHTML = `
            <input type="text" class="input-box title-in" placeholder="Title/Institution" oninput="sync()">
            <textarea class="input-box desc-in" rows="2" placeholder="Details/Description" oninput="sync()"></textarea>
            <hr style="border:0.5px solid var(--accent); opacity:0.2; margin-bottom:10px;">
        `;
        container.appendChild(div);
    }

    function loadImg(e) {
        const reader = new FileReader();
        reader.onload = () => {
            const img = document.getElementById('outPhoto');
            img.src = reader.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function applyTemplate(text) {
        document.getElementById('inSumm').value = text;
        sync();
    }

    function sync() {
        // Basic Fields
        document.getElementById('outName').innerText = document.getElementById('inName').value.toUpperCase() || "YOUR NAME";
        document.getElementById('outSumm').innerText = document.getElementById('inSumm').value;
        document.getElementById('outSkills').innerText = document.getElementById('inSkills').value;

        // Dynamic Section Syncing
        syncSection('eduList', 'outEdu');
        syncSection('expList', 'outExp');
        syncSection('certList', 'outCert');
        syncSection('projList', 'outProj');
    }

    function syncSection(inputId, outputId) {
        const container = document.getElementById(inputId);
        const titles = container.getElementsByClassName('title-in');
        const descs = container.getElementsByClassName('desc-in');
        let html = "";
        
        for(let i=0; i < titles.length; i++) {
            if(titles[i].value) {
                html += `
                <div class="entry-block">
                    <span class="entry-title">${titles[i].value}</span>
                    <div class="content">${descs[i].value}</div>
                </div>`;
            }
        }
        document.getElementById(outputId).innerHTML = html;
    }

    function downloadPDF() {
        const element = document.getElementById('cv-document');
        const isDark = document.body.classList.contains('dark-mode');
        const opt = {
            margin: 0,
            filename: 'Chrome_Interactive_CV.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3, backgroundColor: isDark ? '#0a0a0a' : '#ffffff' },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // Start with one field for each
    window.onload = () => {
        addEntry('eduList');
        addEntry('expList');
    }
</script>

</body>
</html>
